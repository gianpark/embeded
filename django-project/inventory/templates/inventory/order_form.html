{% extends 'inventory/base.html' %}
{% block title %}주문 등록{% endblock %}
{% block content %}
<div class="page-title">주문 등록</div>
<div class="page-sub">주문 정보를 입력하세요</div>
<div class="card" style="max-width:600px">
  <form method="post">{% csrf_token %}
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">고객명 *</label>
        <input type="text" name="customer_name" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">이메일 *</label>
        <input type="email" name="customer_email" class="form-control" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">주문 상품</label>
      <div id="items">
        <div class="item-row flex gap-2 mb-2">
          <select name="product_id" class="form-control">
            {% for p in products %}
            <option value="{{ p.pk }}">{{ p.name }} (재고:{{ p.stock }}개 / {{ p.price }}원)</option>
            {% endfor %}
          </select>
          <input type="number" name="quantity" value="1" min="1" class="form-control" style="width:90px">
        </div>
      </div>
      <button type="button" class="btn btn-ghost btn-sm mt-2" onclick="addItem()">＋ 상품 추가</button>
    </div>
    <div class="form-group">
      <label class="form-label">비고</label>
      <textarea name="note" class="form-control"></textarea>
    </div>
    <div class="flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary">주문 등록</button>
      <a href="{% url 'order_list' %}" class="btn btn-ghost">취소</a>
    </div>
  </form>
</div>
<script>
function addItem() {
  const t = document.querySelector('.item-row').cloneNode(true);
  document.getElementById('items').appendChild(t);
}
</script>
{% endblock %}
