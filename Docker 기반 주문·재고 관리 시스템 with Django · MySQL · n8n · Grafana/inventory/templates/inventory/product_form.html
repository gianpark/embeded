{% extends 'inventory/base.html' %}
{% block title %}상품 {{ action }}{% endblock %}
{% block content %}
<div class="page-title">상품 {{ action }}</div>
<div class="page-sub">상품 정보를 입력하세요</div>
<div class="card" style="max-width:540px">
  <form method="post">{% csrf_token %}
    <div class="form-group">
      <label class="form-label">상품명 *</label>
      <input type="text" name="name" class="form-control" value="{{ product.name|default:'' }}" required>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">단가 (원) *</label>
        <input type="number" name="price" class="form-control" value="{{ product.price|default:0 }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">재고 수량 *</label>
        <input type="number" name="stock" class="form-control" value="{{ product.stock|default:0 }}" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select name="category" class="form-control">
        <option value="">-- 없음 --</option>
        {% for cat in categories %}
        <option value="{{ cat.pk }}" {% if product.category_id == cat.pk %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">설명</label>
      <textarea name="description" class="form-control">{{ product.description|default:'' }}</textarea>
    </div>
    <div class="flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary">{{ action }}</button>
      <a href="{% url 'product_list' %}" class="btn btn-ghost">취소</a>
    </div>
  </form>
</div>
{% endblock %}
