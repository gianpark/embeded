<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{% block title %}재고관리{% endblock %}</title>
<style>
:root{--bg:#0d0f14;--surface:#161920;--card:#1c2028;--border:#2a2f3a;--accent:#4f8ef7;--accent2:#34d399;--warn:#f59e0b;--danger:#f87171;--text:#e2e8f0;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;display:flex;min-height:100vh;}
.sidebar{width:210px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;position:fixed;}
.logo{padding:0 20px 20px;font-size:16px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);text-decoration:none;font-size:14px;border-left:2px solid transparent;}
.nav a:hover{color:var(--text);background:var(--card);}
.nav a.active{color:var(--accent);border-left-color:var(--accent);background:rgba(79,142,247,0.08);}
.nav-sec{padding:12px 20px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.main{margin-left:210px;flex:1;padding:32px;}
.page-title{font-size:22px;font-weight:600;margin-bottom:6px;}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;font-weight:600;}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:20px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.stat-value{font-size:28px;font-weight:700;margin-top:6px;}
.blue{color:var(--accent);}.green{color:var(--accent2);}.yellow{color:var(--warn);}.red{color:var(--danger);}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:12px 14px;border-bottom:1px solid rgba(42,47,58,0.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.b-blue{background:rgba(79,142,247,0.15);color:var(--accent);}
.b-green{background:rgba(52,211,153,0.15);color:var(--accent2);}
.b-yellow{background:rgba(245,158,11,0.15);color:var(--warn);}
.b-red{background:rgba(248,113,113,0.15);color:var(--danger);}
.b-gray{background:rgba(100,116,139,0.15);color:var(--muted);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all 0.15s;font-family:inherit;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-danger{background:rgba(248,113,113,0.15);color:var(--danger);border:1px solid rgba(248,113,113,0.3);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-sm{padding:5px 11px;font-size:12px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.form-control{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:inherit;}
.form-control:focus{outline:none;border-color:var(--accent);}
textarea.form-control{resize:vertical;min-height:80px;}
.alert{padding:12px 16px;border-radius:7px;margin-bottom:16px;font-size:14px;}
.alert-success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--accent2);}
.flex{display:flex;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
.gap-2{gap:8px;}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.mt-2{margin-top:16px;}.mb-2{margin-bottom:16px;}.text-muted{color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">IMS</div>
  <nav class="nav">
    <div class="nav-sec">Overview</div>
    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">▣ 대시보드</a>
    <div class="nav-sec">재고</div>
    <a href="{% url 'product_list' %}" class="{% if 'product' in request.resolver_match.url_name %}active{% endif %}">◈ 상품 목록</a>
    <a href="{% url 'product_create' %}">＋ 상품 등록</a>
    <div class="nav-sec">주문</div>
    <a href="{% url 'order_list' %}" class="{% if 'order' in request.resolver_match.url_name %}active{% endif %}">◉ 주문 목록</a>
    <a href="{% url 'order_create' %}">＋ 주문 등록</a>
  </nav>
</aside>
<main class="main">
  {% if messages %}{% for msg in messages %}
  <div class="alert alert-success">{{ msg }}</div>
  {% endfor %}{% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
